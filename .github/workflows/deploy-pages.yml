name: Deploy prototype to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      confirm_public_pages:
        description: 'I confirm that this Pages deployment is publicly reachable and the corpus is approved for this test.'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  guard-public-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Reject an unconfirmed public deployment
        if: ${{ inputs.confirm_public_pages != true }}
        run: |
          echo 'Public deployment confirmation was not provided.'
          exit 1
      - name: Confirm intentional public deployment
        if: ${{ inputs.confirm_public_pages == true }}
        run: echo 'Public deployment explicitly confirmed.'

  build:
    needs: guard-public-deployment
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install browser-DOM test requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Verify source and prepare static runtime artifact
        run: npm run github:verify

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
